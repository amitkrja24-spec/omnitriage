name: omnitriage_dashboard
description: OmniTriage Coordinator Dashboard
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  cloud_firestore: ^4.15.0

  # UI & Fonts
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # Charts
  fl_chart: ^0.67.0

  # Date formatting
  intl: ^0.18.1

  # Icons
  cupertino_icons: ^1.0.2

  #web request
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
